# SPEC-V3-002: libghostty-vt dylib runtime rpath 설정
# moai-studio-terminal/build.rs 가 target/<profile>/ 로 dylib 을 복사하고,
# binary 는 @executable_path (macOS) / $ORIGIN (Linux) 에서 dylib 을 찾는다.
# Windows 는 SPEC-V3-002 §6 Exclusions (Phase 7 이관) 이라 설정 없음.

[target.'cfg(target_os = "macos")']
rustflags = ["-C", "link-arg=-Wl,-rpath,@executable_path"]

[target.'cfg(target_os = "linux")']
rustflags = ["-C", "link-arg=-Wl,-rpath,$ORIGIN"]
